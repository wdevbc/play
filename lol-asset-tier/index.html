<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산 시장 투자 티어 테스트 (Asset & Investment Tier Test)</title>
  <meta name="description" content="나의 자산 운용 철학과 경제력으로 평가하는 대표적인 등급(티어) 판정 테스트">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <header class="header">
      <a href="../index.html" class="header__logo">
        <div class="header__logo-dot"></div>
        Investment Tier Test
      </a>
      <a href="../index.html" class="header__home-btn">포털 홈으로</a>
    </header>

    <!-- 메인 박스 -->
    <main class="content-box">
      <!-- 1. 시작 인트로 화면 -->
      <div data-view="intro" class="intro">
        <svg class="intro__logo-container" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logo-gold" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe082"/>
              <stop offset="50%" stop-color="#ffb300"/>
              <stop offset="100%" stop-color="#ff6f00"/>
            </linearGradient>
            <linearGradient id="logo-blue" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00e5ff"/>
              <stop offset="100%" stop-color="#006064"/>
            </linearGradient>
          </defs>
          <!-- 날개 형상 -->
          <path d="M20 40 L10 55 L25 70 L35 55 Z" fill="url(#logo-blue)" opacity="0.6"/>
          <path d="M80 40 L90 55 L75 70 L65 55 Z" fill="url(#logo-blue)" opacity="0.6"/>
          <!-- 중앙 원반 -->
          <circle cx="50" cy="50" r="35" fill="#0d1222" stroke="url(#logo-gold)" stroke-width="2"/>
          <circle cx="50" cy="50" r="28" fill="#131a30" stroke="#1e283d" stroke-width="1.5"/>
          <!-- 돈 주머니 / 저울 아이콘 -->
          <path d="M50 35 V62 M40 45 H60 M40 60 H60" stroke="url(#logo-gold)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M43 45 L35 52 H51 Z" fill="url(#logo-blue)" opacity="0.8"/>
          <path d="M57 45 L49 52 H65 Z" fill="url(#logo-blue)" opacity="0.8"/>
        </svg>
        <h1 class="intro__title">자산 시장<br><span class="intro__title-highlight">투자 티어 테스트</span></h1>
        <p class="intro__desc">
          당신의 실제 자산 규모와 투자 성향, 재테크 철학을 종합 평가하여 <strong>브론즈부터 챌린저까지</strong>의 등급(티어)으로 판별해 드립니다.
        </p>
        <div class="intro__action">
          <button data-action="start" class="btn btn--gold">투자 테스트 시작</button>
        </div>
      </div>

      <!-- 2. 진행 바 (퀴즈 중 활성화) -->
      <div data-view="progress" class="progress" style="display: none;">
        <div class="progress__info">
          <span data-text="progress-step">질문 1 / 9</span>
          <span data-text="progress-percent">0%</span>
        </div>
        <div class="progress__track">
          <div data-fill="progress" class="progress__fill"></div>
        </div>
      </div>

      <!-- 3. 질문 및 답변 화면 -->
      <div data-view="quiz" class="quiz" style="display: none;">
        <h2 data-text="question" class="quiz__question">질문이 이곳에 렌더링됩니다.</h2>
        <div data-container="options" class="quiz__options">
          <!-- 버튼들이 동적으로 생성됩니다 -->
        </div>
      </div>

      <!-- 4. 결과 분석 로딩 화면 -->
      <div data-view="loading" class="loader" style="display: none;">
        <div class="loader__circle"></div>
        <p class="loader__text">자산 및 투자 성향 분석 중...</p>
      </div>
    </main>

    <!-- 푸터 -->
    <footer class="footer">
      &copy; 2026 Tier Test. All rights reserved. 본 서비스는 모의 자산 진단 및 투자 성향 테스트 콘텐츠입니다.
    </footer>
  </div>

  <!-- 질문 및 알고리즘 파일 로드 -->
  <script src="js/tierCalculator.js"></script>
  <script>
    class AssetTierQuiz {
      constructor() {
        this.questions = window.LolAssetTier.questions;
        this.currentQuestionIdx = 0;
        this.selectedAnswers = [];

        // DOM 요소 캐시 객체
        this.dom = {};
      }

      // 앱 초기화 실행 메서드
      init() {
        this.cacheElements();
        this.bindEvents();
      }

      // DOM 요소 캐시
      cacheElements() {
        this.dom.introView = document.querySelector("[data-view='intro']");
        this.dom.progressView = document.querySelector("[data-view='progress']");
        this.dom.quizView = document.querySelector("[data-view='quiz']");
        this.dom.loadingView = document.querySelector("[data-view='loading']");

        this.dom.startBtn = document.querySelector("[data-action='start']");
        this.dom.questionText = document.querySelector("[data-text='question']");
        this.dom.optionsContainer = document.querySelector("[data-container='options']");
        this.dom.progressText = document.querySelector("[data-text='progress-step']");
        this.dom.progressPercent = document.querySelector("[data-text='progress-percent']");
        this.dom.progressFill = document.querySelector("[data-fill='progress']");
      }

      // 이벤트 핸들러 바인딩
      bindEvents() {
        this.dom.startBtn.addEventListener("click", () => this.startQuiz());
      }

      // 퀴즈 시작 메서드
      startQuiz() {
        this.dom.introView.style.display = "none";
        this.dom.progressView.style.display = "block";
        this.dom.quizView.style.display = "flex";
        this.loadQuestion(0);
      }

      // 질문 로드 및 렌더링
      loadQuestion(idx) {
        this.currentQuestionIdx = idx;
        const q = this.questions[idx];

        // 프로그레스 바 상태 계산 및 렌더링
        const total = this.questions.length;
        const progressPercentage = Math.round((idx / total) * 100);
        
        this.dom.progressText.innerText = `질문 ${idx + 1} / ${total}`;
        this.dom.progressPercent.innerText = `${progressPercentage}%`;
        this.dom.progressFill.style.width = `${progressPercentage}%`;

        // 질문 텍스트 출력
        this.dom.questionText.innerText = `${idx + 1}. ${q.text}`;

        // 답변 옵션 버튼 렌더링
        this.dom.optionsContainer.innerHTML = "";
        q.options.forEach((opt, optIdx) => {
          const btn = document.createElement("button");
          btn.className = "quiz__option";
          btn.innerText = opt.text;
          btn.addEventListener("click", () => this.handleSelectOption(optIdx));
          this.dom.optionsContainer.appendChild(btn);
        });
      }

      // 답변 선택 처리
      handleSelectOption(optIdx) {
        this.selectedAnswers[this.currentQuestionIdx] = optIdx;
        
        if (this.currentQuestionIdx + 1 < this.questions.length) {
          this.loadQuestion(this.currentQuestionIdx + 1);
        } else {
          this.showLoadingAndCalculate();
        }
      }

      // 로딩 연출 및 점수 결과 리다이렉트
      showLoadingAndCalculate() {
        // 프로그레스 상태 완료 처리
        this.dom.progressText.innerText = "분석 완료";
        this.dom.progressPercent.innerText = "100%";
        this.dom.progressFill.style.width = "100%";

        this.dom.quizView.style.display = "none";
        this.dom.progressView.style.display = "none";
        this.dom.loadingView.style.display = "flex";

        // 1.5초 후 계산 완료 처리 및 결과창 이동 (ES6 Template literals 활용)
        setTimeout(() => {
          const result = window.LolAssetTier.calculateTier(this.selectedAnswers);
          let redirectUrl = `result.html?tier=${result.tier}`;
          if (result.score !== null) {
            redirectUrl += `&score=${result.score}`;
          }
          window.location.href = redirectUrl;
        }, 1500);
      }
    }

    // DOM 로드 완료 시 인스턴스화 및 init 호출
    document.addEventListener("DOMContentLoaded", () => {
      const quizApp = new AssetTierQuiz();
      quizApp.init();
    });
  </script>
</body>
</html>
